# Development Profile - Uses MockNest for all API calls
spring:
  config:
    activate:
      on-profile: dev

# API Configuration - All pointing to MockNest with token
# X-Api-Key header is automatically added when token is present
api:
  bored:
    url: ${MOCKNEST_API_URL:https://srpz0l3amh.execute-api.eu-west-1.amazonaws.com/mocks/mocknest/bored/api}
    token: ${MOCKNEST_API_TOKEN:}
  petstore:
    url: ${MOCKNEST_API_URL:https://srpz0l3amh.execute-api.eu-west-1.amazonaws.com/mocks/mocknest/petstore/pet}
    token: ${MOCKNEST_API_TOKEN:}
